name: Docker Python Image

on:
  pull_request:
    paths:
      - ".github/workflows/docker-python.yml"
      - ".dockerignore"
      - "docker/python/Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "README.md"
      - "LICENSE"
      - "omop_alchemy/**"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/docker-python.yml"
      - ".dockerignore"
      - "docker/python/Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - "README.md"
      - "LICENSE"
      - "omop_alchemy/**"

permissions:
  contents: read

jobs:
  build-check:
    name: Build check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build python image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/python/Dockerfile
          build-args: |
            INSTALL_DEV=true
          push: false
          load: false
          tags: omop-alchemy-python:build-check
          cache-from: type=gha,scope=docker-python
          cache-to: type=gha,mode=max,scope=docker-python

  publish:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Hub repository variable
        run: |
          if [ -z "${{ vars.DOCKERHUB_REPOSITORY_PYTHON }}" ]; then
            echo "Repository variable DOCKERHUB_REPOSITORY_PYTHON is not set."
            echo "Example value: australiancancerdatanetwork/omop-alchemy-python"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ vars.DOCKERHUB_REPOSITORY_PYTHON }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push python image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/python/Dockerfile
          build-args: |
            INSTALL_DEV=true
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-python
          cache-to: type=gha,mode=max,scope=docker-python
