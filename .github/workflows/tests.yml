name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sqlite-tests:
    name: SQLite tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

  postgres-tests:
    name: PostgreSQL tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U test -d test_db"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (including postgres extra)
        run: pip install -e ".[dev,postgres]"

      - name: Provision test_cdm_db
        run: |
          omop-config configure omop_alchemy \
            --test-dialect postgresql+psycopg --test-database test_cdm \
            --test-host localhost --test-port 55432 --test-cdm-schema public \
            --test-user test --test-password test --test-database-name test_db

      - name: Run tests
        run: pytest -v
