site_name: OMOP Alchemy
site_description: SQLAlchemy-first, typed representation of the OMOP Common Data Model
site_url: https://AustralianCancerDataNetwork.github.io/OMOP_Alchemy/
repo_url: https://github.com/AustralianCancerDataNetwork/OMOP_Alchemy
repo_name: OMOP_Alchemy

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - attr_list
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid
  - toc:
      permalink: true

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - js/mermaid-init.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - omop_alchemy
          options:
            show_source: false
            docstring_style: numpy
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true

nav:
  - Home: index.md

  - Getting Started:
      - Overview: getting-started/index.md
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
      - Maintenance CLI: getting-started/maintenance.md

  - CLI Reference:
      - Overview: cli/index.md
      - Command Reference: cli/reference.md

  - API Reference:
      - Overview: api/index.md
      - Architecture: api/architecture.md
      - CDM Base: api/base.md
      - Columns: api/columns.md
      - Configuration: api/configuration.md
      - Relationships: api/relationships.md
      - Typing: api/typing.md

  - Object-Relational Mappings:
      - Overview: models/index.md
      - Clinical:
          - Overview: models/clinical/index.md
          - Condition Occurrence: models/clinical/condition_occurrence.md
          - Drug Exposure: models/clinical/drug_exposure.md
          - Measurement: models/clinical/measurement.md
          - Observation: models/clinical/observation.md
          - Person: models/clinical/person.md
      - Derived:
          - Overview: models/derived/index.md
          - Cohort: models/derived/cohort.md
          - Condition Era: models/derived/condition_era.md
          - Dose Era: models/derived/dose_era.md
          - Drug Era: models/derived/drug_era.md
      - Health Economic:
          - Overview: models/health_economic/index.md
          - Cost: models/health_economic/cost.md
          - Payer Plan Period: models/health_economic/payer_plan_period.md
      - Health System:
          - Overview: models/health_system/index.md
          - Care Site: models/health_system/care_site.md
          - Location: models/health_system/location.md
          - Provider: models/health_system/provider.md
          - Visit Detail: models/health_system/visit_detail.md
          - Visit Occurrence: models/health_system/visit_occurrence.md
      - Metadata:
          - Overview: models/metadata/index.md
          - CDM Source: models/metadata/cdm_source.md
          - Metadata: models/metadata/metadata.md
      - Structural:
          - Overview: models/structural/index.md
          - Episode: models/structural/episode.md
          - Episode Event: models/structural/episode_event.md
          - Fact Relationship: models/structural/fact_relationship.md
      - Unstructured:
          - Overview: models/unstructured/index.md
          - Image: models/unstructured/image.md
          - Image Feature: models/unstructured/image_feature.md
          - Note: models/unstructured/note.md
          - Note NLP: models/unstructured/note_nlp.md
      - Vocabulary:
          - Overview: models/vocabulary/index.md
          - Concept: models/vocabulary/concept.md
          - Concept Relationship: models/vocabulary/concept_relationship.md
          - Domain: models/vocabulary/domain.md
          - Vocabulary: models/vocabulary/vocabulary.md

  - OMOP-Specific Validation:
      - Overview: validation/index.md
      - Domain Rules: validation/domain-rules.md
      - Domain Rule Runtime: validation/domain-runtime.md

  - Advanced:
      - Overview: advanced/index.md
      - Backends: advanced/backends.md
      - Views & Analytics: advanced/views.md
      - Event Timelines: advanced/timelines.md
      - PostgreSQL Full-Text Search: advanced/fulltext.md
      - Querying Tips: advanced/query_patterns.md
